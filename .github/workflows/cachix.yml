# .github/workflows/cachix.yml
name: Build and Cache
on:
  push:
    branches: [main, modularize-host-configs]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Perform Flake check
        run: nix flake check

  build:
    needs: flake-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host:
          [
            razer-nixos,
            work-nix-wsl,
            nixos-portable,
            ryzn-nix-wsl,
            sys-galp-nix,
            thkpd-pve1,
          ]
      fail-fast: false # Continue other builds if one fails
    steps:
      - uses: actions/checkout@v3
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v15
        with:
          name: jdguillot
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build Systems
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
