
set -g mouse
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# set -g prefix C-d
set -g set-clipboard on
# set -g remain-on-exit on
set -sg escape-time 10
set -g history-limit 100000
set -g base-index 1
set -g renumber-windows on

# Always start shells properly
set -g default-shell $SHELL
set -g default-command "$SHELL -l"

# Ensure environment variables stay synced
set -g update-environment -r
set -ag update-environment "TERM TERM_PROGRAM SSH_AUTH_SOCK SSH_AGENT_PID DISPLAY WAYLAND_DISPLAY XAUTHORITY PATH"

# open panes/windows in current directory
bind c new-window -c "#{pane_current_path}"

unbind '"'
unbind %

bind | split-window -h -p 25 -c "#{pane_current_path}"
bind - split-window -v -l 10 -c "#{pane_current_path}"

# Set prefix key to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Seamless pane navigation with Ctrl-h,j,k,l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move current window left and select it
bind -r < swap-window -t -1 \; select-window -t -1

# Move current window right and select it
bind -r > swap-window -t +1 \; select-window -t +1

# Close pane without confirm
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind-key X kill-session # skip "kill-session 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Visuals
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:RGB"

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"
set -g focus-events on

# Make pane borders more visible
set-option -g pane-border-lines double
set-option -g pane-border-indicators arrows
set-option -g pane-border-status top

# Dim inactive panes so active pane is obvious
setw -g window-active-style "default"
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_mauve}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format ""

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_mauve},fg=#{@thm_bg},bold"

